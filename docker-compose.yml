# NEWGAME Platform — Docker Compose for Local Full-Stack Development
# Usage:
#   docker compose up        ← start all services
#   docker compose up web    ← start frontend only
#   docker compose up api    ← start backend only
#   docker compose down      ← stop all
#
# Prerequisites:
#   - Docker Desktop installed
#   - Copy .env.example to .env and fill in Firebase credentials

services:
  # ── NestJS Backend API ──────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
    env_file:
      - apps/api/.env
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Frontend ────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://api:3001/api
    env_file:
      - apps/web/.env.local
    volumes:
      - ./apps/web/src:/app/apps/web/src:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Redis (for rate limiting) ───────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis-data:
