# NEWGAME Platform — Docker Compose (Security Hardened)
#
# Arsitektur jaringan:
#   Internet → Nginx (80/443) → web (internal) → api (internal) → postgres/redis (internal only)
#
# Hanya port 80 dan 443 yang terbuka ke luar.
# Database dan API tidak pernah expose ke public internet.
#
# Usage:
#   docker compose up -d              ← start semua service
#   docker compose up -d web api      ← tanpa postgres/redis (pakai cloud)
#   docker compose logs -f api        ← live logs API
#   docker compose down               ← stop semua
#   docker compose down -v            ← stop + hapus volume data
#
# Prasyarat:
#   - Docker Desktop terinstall
#   - Copy .env.example → .env dan isi nilai sebenarnya
#   - Jangan pernah commit file .env ke git

services:

  # ── Nginx Reverse Proxy (satu-satunya yang expose ke internet) ──
  nginx:
    image: nginx:alpine
    container_name: newgame_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro       # sertifikat SSL (Let's Encrypt / self-signed)
    depends_on:
      - web
      - api
    networks:
      - frontend_net
    restart: unless-stopped
    # Resource limits — nginx tidak butuh banyak resource
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'

  # ── Next.js Frontend ────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: newgame_web
    # TIDAK expose port ke host — hanya diakses via nginx (internal network)
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:3001/api   # internal, tidak expose
    env_file:
      - apps/web/.env.local
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend_net   # bisa diakses nginx
    restart: unless-stopped
    # Read-only filesystem — container tidak bisa tulis ke disk
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    # Jangan jalankan sebagai root
    user: "1001:1001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── NestJS API ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: newgame_api
    # TIDAK expose ke host — hanya nginx dan web yang bisa akses (internal)
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=https://unandnewgame-tan.vercel.app
      - DATABASE_URL=${DATABASE_URL}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
    env_file:
      - apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend_net   # bisa diakses web + nginx
      - backend_net    # bisa akses postgres + redis
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    user: "1001:1001"
    # Matikan semua Linux capabilities yang tidak perlu
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE    # hanya butuh ini untuk bind port
    # Cegah privilege escalation
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── PostgreSQL Database ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: newgame_postgres
    # TIDAK ada ports: — database hanya di internal network, tidak bisa diakses dari luar
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newgame}
      POSTGRES_USER: ${POSTGRES_USER:-newgame_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # WAJIB diisi di .env
      # Hanya listen di localhost internal container
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init script — set permission ketat
      - ./scripts/db-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - backend_net    # hanya API yang bisa akses
    restart: unless-stopped
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    # Security options
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newgame_app} -d ${POSTGRES_DB:-newgame}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (rate limiting + cache) ───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: newgame_redis
    # TIDAK expose ke host
    expose:
      - "6379"
    # Require password + disable dangerous commands
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme_in_production}
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB  ""
      --rename-command DEBUG    ""
      --rename-command CONFIG   ""
      --rename-command SLAVEOF  ""
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend_net    # hanya API yang bisa akses
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_in_production}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

# ── Networks ─────────────────────────────────────────────────────
# Dua network terpisah:
#   frontend_net: nginx ↔ web ↔ api  (internet-facing layer)
#   backend_net:  api ↔ postgres ↔ redis  (data layer, ISOLASI PENUH)
networks:
  frontend_net:
    driver: bridge
    # IPAM untuk IP range yang tidak bentrok
    ipam:
      config:
        - subnet: 172.20.0.0/24
  backend_net:
    driver: bridge
    # Network internal — tidak bisa diakses dari host sama sekali
    internal: true    # ← KEY: blokir semua traffic ke/dari internet
    ipam:
      config:
        - subnet: 172.20.1.0/24

# ── Volumes ──────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
