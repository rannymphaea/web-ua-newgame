name: newgame_mobile
description: >
  NEWGAME Mobile Simulator — Tampilkan web app dalam frame HP di desktop Windows,
  atau sebagai WebView nyata di Android. Satu app, dua mode.
version: 0.1.5+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.10.0          # Android WebView
  webview_windows: ^0.4.0           # Windows WebView (EdgeChromium)
  connectivity_plus: ^6.1.0
  url_launcher: ^6.3.1
  window_manager: ^0.3.9            # Kontrol ukuran jendela desktop

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
