<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWGAME - System Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        h1,h2,h3 { font-family: 'Rajdhani', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        body { background: #070910; }
        .glass { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
        .accent-bar { height: 3px; background: linear-gradient(90deg,#E63946,#1D3557,#457B9D); }
        .sidebar { width:220px; position:fixed; left:0; top:0; height:100%; background:rgba(7,9,16,0.96); border-right:1px solid rgba(255,255,255,0.07); z-index:40; display:flex; flex-direction:column; transition:transform 0.3s; }
        .nav-item { display:flex; align-items:center; gap:10px; padding:9px 14px; border-radius:8px; color:#6b7280; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; text-decoration:none; }
        .nav-item:hover { background:rgba(255,255,255,0.05); color:#fff; }
        .nav-item.active { background:rgba(230,57,70,0.15); color:#E63946; border-left:2px solid #E63946; }
        .input-field { background:rgba(255,255,255,0.05); color:white; padding:8px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); font-size:13px; }
        .input-field:focus { outline:none; border-color:#E63946; }
        select.input-field option { background:#111827; }
        .btn-secondary { background:rgba(255,255,255,0.07); color:#d1d5db; font-weight:500; padding:7px 14px; border-radius:8px; font-size:13px; border:1px solid rgba(255,255,255,0.1); cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:6px; }
        .btn-secondary:hover { background:rgba(255,255,255,0.12); color:white; }
        .badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:700; }
        .badge-success { background:rgba(34,197,94,0.15); color:#4ade80; border:1px solid rgba(34,197,94,0.3); }
        .badge-failed { background:rgba(220,38,38,0.15); color:#f87171; border:1px solid rgba(220,38,38,0.3); }
        @media(max-width:768px){ .sidebar{ transform:translateX(-100%); } .sidebar.open{ transform:translateX(0); } .main{ margin-left:0!important; } }
    </style>
</head>
<body class="text-white min-h-screen">
<div class="accent-bar fixed top-0 left-0 right-0 z-50"></div>

<div class="flex min-h-screen pt-[3px]">
    <aside class="sidebar" id="sidebar">
        <div class="p-5 border-b border-white/5">
            <div class="flex items-center gap-3">
                <img src="../../assets/logo.png" alt="NEWGAME" class="w-9 h-9">
                <div>
                    <h2 class="text-white font-bold text-base" style="font-family:'Rajdhani',sans-serif;">NEWGAME</h2>
                    <p class="text-gray-500 text-xs mono">System Logs</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 p-3 space-y-1">
            <a href="dashboard.html" class="nav-item">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7h18M3 12h18M3 17h18"/></svg>
                Dashboard
            </a>
            <a href="admin.html" class="nav-item">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
                Admin Panel
            </a>
            <a href="members.html" class="nav-item">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Members
            </a>
            <a href="logs.html" class="nav-item active">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                System Logs
            </a>
        </nav>
        <div class="p-3 border-t border-white/5">
            <button onclick="handleLogout()" class="nav-item w-full text-left hover:text-red-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Sign Out
            </button>
        </div>
    </aside>

    <main class="main flex-1 p-6 overflow-auto" style="margin-left:220px;">
        <div class="md:hidden flex items-center gap-3 mb-4">
            <button onclick="document.getElementById('sidebar').classList.toggle('open')" class="text-gray-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <h1 class="text-xl font-bold text-white">System Logs</h1>
        </div>

        <div class="flex items-center justify-between mb-6">
            <div class="hidden md:block">
                <h1 class="text-2xl font-bold text-white">System Logs</h1>
                <p class="text-gray-500 text-sm">Immutable audit trail — cannot be edited or deleted</p>
            </div>
            <button onclick="exportLogs()" class="btn-secondary text-sm">Export CSV</button>
        </div>

        <!-- Filters -->
        <div class="glass rounded-xl p-4 mb-4 flex flex-wrap gap-3">
            <select id="filterAction" class="input-field w-auto" onchange="loadLogs(true)">
                <option value="">All Actions</option>
                <option value="attend">Attend</option>
                <option value="close_event">Close Event</option>
                <option value="create_event">Create Event</option>
                <option value="manual_xp_edit">XP Edit</option>
                <option value="import_members">Import Members</option>
                <option value="update_role">Role Update</option>
                <option value="update_member">Member Update</option>
                <option value="approve_leave">Approve Leave</option>
                <option value="reject_leave">Reject Leave</option>
                <option value="suspend_user">Suspend User</option>
                <option value="set_initial_role">Set Role</option>
            </select>
            <select id="filterResult" class="input-field w-auto" onchange="loadLogs(true)">
                <option value="">All Results</option>
                <option value="success">Success</option>
                <option value="failed">Failed</option>
            </select>
            <input type="date" id="filterDate" class="input-field w-auto" onchange="loadLogs(true)">
            <input type="text" id="filterUser" placeholder="Filter by user ID..." class="input-field flex-1 min-w-[180px]" oninput="loadLogs(true)">
            <button onclick="clearFilters()" class="btn-secondary text-sm">Clear</button>
        </div>

        <!-- Stats row -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4" id="logStats">
            <div class="glass rounded-xl p-4 text-center">
                <p class="text-gray-500 text-xs uppercase tracking-wider mb-1">Total Logs</p>
                <p class="text-2xl font-bold text-white" id="statTotal" style="font-family:'Rajdhani',sans-serif;">-</p>
            </div>
            <div class="glass rounded-xl p-4 text-center">
                <p class="text-gray-500 text-xs uppercase tracking-wider mb-1">Success</p>
                <p class="text-2xl font-bold text-green-400" id="statSuccess" style="font-family:'Rajdhani',sans-serif;">-</p>
            </div>
            <div class="glass rounded-xl p-4 text-center">
                <p class="text-gray-500 text-xs uppercase tracking-wider mb-1">Failed</p>
                <p class="text-2xl font-bold text-red-400" id="statFailed" style="font-family:'Rajdhani',sans-serif;">-</p>
            </div>
            <div class="glass rounded-xl p-4 text-center">
                <p class="text-gray-500 text-xs uppercase tracking-wider mb-1">Today</p>
                <p class="text-2xl font-bold text-blue-400" id="statToday" style="font-family:'Rajdhani',sans-serif;">-</p>
            </div>
        </div>

        <!-- Logs table -->
        <div class="glass rounded-xl overflow-hidden">
            <div class="p-4 border-b border-white/5 flex items-center justify-between">
                <span class="text-gray-400 text-sm" id="logsCountLabel">-</span>
                <div class="flex items-center gap-2 text-xs text-gray-500 mono">
                    <span>Read-only</span>
                    <span class="w-2 h-2 rounded-full bg-red-500"></span>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table style="width:100%;border-collapse:separate;border-spacing:0;">
                    <thead>
                        <tr>
                            <th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#6b7280;border-bottom:1px solid rgba(255,255,255,0.06);">Timestamp</th>
                            <th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#6b7280;border-bottom:1px solid rgba(255,255,255,0.06);">User</th>
                            <th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#6b7280;border-bottom:1px solid rgba(255,255,255,0.06);">Action</th>
                            <th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#6b7280;border-bottom:1px solid rgba(255,255,255,0.06);">Result</th>
                            <th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#6b7280;border-bottom:1px solid rgba(255,255,255,0.06);">Details</th>
                        </tr>
                    </thead>
                    <tbody id="logsBody">
                        <tr><td colspan="5" style="padding:40px;text-align:center;color:#6b7280;">Loading logs...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="p-4 border-t border-white/5 flex justify-center">
                <button onclick="loadMore()" id="btnLoadMore" class="btn-secondary text-sm hidden">Load More</button>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import {
        getFirestore, collection, doc, getDoc, getDocs,
        query, where, orderBy, limit, startAfter
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
            apiKey: "AIzaSyD6AqPbmW4UM1d1o8caBWSIi61yQsxxsGk",
            authDomain: "qr-absensi-unandnewgame.firebaseapp.com",
            projectId: "qr-absensi-unandnewgame",
            storageBucket: "qr-absensi-unandnewgame.firebasestorage.app",
            messagingSenderId: "377822320778",
            appId: "1:377822320778:web:f7305bb71019f670ccf573"
    };

         // BARU — cek dulu sebelum inisialisasi
    import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
    const auth = getAuth(app);
    const db = getFirestore(app);

    let lastDoc = null;
    let allLogsCache = [];
    const PAGE = 50;

    onAuthStateChanged(auth, async (user) => {
        if (!user || !user.emailVerified) { window.location.href = '/public/pages/login.html'; return; }
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (!userDoc.exists()) { await signOut(auth); return; }
        const data = userDoc.data();
        if (!['admin','superadmin','presiden'].includes(data.role)) {
            window.location.href = '/public/pages/dashboard.html';
            return;
        }
        await loadStats();
        await loadLogs(true);
        setupAutoLogout();
    });

    async function loadStats() {
        try {
            const snap = await getDocs(collection(db, 'logs'));
            const logs = snap.docs.map(d => d.data());
            const today = new Date();
            today.setHours(0,0,0,0);

            document.getElementById('statTotal').textContent = logs.length;
            document.getElementById('statSuccess').textContent = logs.filter(l => l.result === 'success').length;
            document.getElementById('statFailed').textContent = logs.filter(l => l.result === 'failed').length;
            document.getElementById('statToday').textContent = logs.filter(l => {
                if (!l.timestamp) return false;
                const d = l.timestamp.toDate ? l.timestamp.toDate() : new Date(l.timestamp.seconds * 1000);
                return d >= today;
            }).length;
        } catch (e) { console.error(e); }
    }

    window.loadLogs = async function(reset = false) {
        if (reset) { lastDoc = null; document.getElementById('logsBody').innerHTML = '<tr><td colspan="5" style="padding:40px;text-align:center;color:#6b7280;">Loading...</td></tr>'; }

        const filterAction = document.getElementById('filterAction').value;
        const filterResult = document.getElementById('filterResult').value;
        const filterDate = document.getElementById('filterDate').value;
        const filterUser = document.getElementById('filterUser').value.trim();

        try {
            let constraints = [orderBy('timestamp', 'desc'), limit(PAGE)];
            if (filterAction) constraints.unshift(where('action', '==', filterAction));
            if (filterResult) constraints.unshift(where('result', '==', filterResult));
            if (lastDoc && !reset) constraints.push(startAfter(lastDoc));

            const q = query(collection(db, 'logs'), ...constraints);
            const snap = await getDocs(q);

            let logs = snap.docs.map(d => ({ id: d.id, ...d.data() }));

            // Filter tanggal dan user di client (Firestore range query terbatas)
            if (filterDate) {
                const day = new Date(filterDate);
                day.setHours(0,0,0,0);
                const dayEnd = new Date(filterDate);
                dayEnd.setHours(23,59,59,999);
                logs = logs.filter(l => {
                    if (!l.timestamp) return false;
                    const d = l.timestamp.toDate ? l.timestamp.toDate() : new Date(l.timestamp.seconds * 1000);
                    return d >= day && d <= dayEnd;
                });
            }
            if (filterUser) {
                logs = logs.filter(l => (l.userId || '').toLowerCase().includes(filterUser.toLowerCase()));
            }

            lastDoc = snap.docs[snap.docs.length - 1] || null;
            document.getElementById('btnLoadMore').classList.toggle('hidden', snap.size < PAGE);
            document.getElementById('logsCountLabel').textContent = `Showing ${reset ? logs.length : '...'} logs`;

            const actionColors = {
                attend: '#4ade80', close_event: '#60a5fa', create_event: '#60a5fa',
                manual_xp_edit: '#facc15', import_members: '#a78bfa',
                update_role: '#fb923c', update_member: '#fb923c',
                approve_leave: '#4ade80', reject_leave: '#f87171',
                suspend_user: '#f87171', set_initial_role: '#34d399'
            };

            const rows = logs.map(l => {
                const ts = l.timestamp ? (l.timestamp.toDate ? l.timestamp.toDate() : new Date(l.timestamp.seconds * 1000)).toLocaleString('en-US', {
                    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit'
                }) : '-';

                const details = [
                    l.reason, l.eventName, l.newRole ? `→ ${l.newRole}` : '',
                    l.totalImported ? `${l.totalImported} members` : '',
                    l.newXP !== undefined ? `XP: ${l.oldXP} → ${l.newXP}` : '',
                    l.targetUserId ? `target: ${l.targetUserId.slice(0,8)}...` : ''
                ].filter(Boolean).join(' | ');

                const actionColor = actionColors[l.action] || '#9ca3af';

                return `
                    <tr style="border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background=''">
                        <td style="padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#4b5563;">${ts}</td>
                        <td style="padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#6b7280;">${esc((l.userId || '-').slice(0,16))}${l.userId && l.userId.length > 16 ? '...' : ''}</td>
                        <td style="padding:10px 14px;"><span style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:${actionColor};">${esc(l.action || '-')}</span></td>
                        <td style="padding:10px 14px;"><span class="badge badge-${l.result === 'success' ? 'success' : 'failed'}">${l.result || '-'}</span></td>
                        <td style="padding:10px 14px;font-size:12px;color:#6b7280;max-width:300px;" title="${esc(details)}">${esc(details.slice(0, 80))}${details.length > 80 ? '...' : ''}</td>
                    </tr>`;
            }).join('');

            if (reset) {
                document.getElementById('logsBody').innerHTML = rows || '<tr><td colspan="5" style="padding:40px;text-align:center;color:#6b7280;">No logs found</td></tr>';
            } else {
                document.getElementById('logsBody').innerHTML += rows;
            }

        } catch (err) {
            console.error('loadLogs error:', err);
            document.getElementById('logsBody').innerHTML = '<tr><td colspan="5" style="padding:40px;text-align:center;color:#f87171;">Failed to load logs</td></tr>';
        }
    };

    window.loadMore = () => loadLogs(false);

    window.clearFilters = function() {
        document.getElementById('filterAction').value = '';
        document.getElementById('filterResult').value = '';
        document.getElementById('filterDate').value = '';
        document.getElementById('filterUser').value = '';
        loadLogs(true);
    };

    window.exportLogs = async function() {
        try {
            const snap = await getDocs(query(collection(db, 'logs'), orderBy('timestamp', 'desc'), limit(1000)));
            const rows = [['Timestamp', 'User ID', 'Action', 'Result', 'Target User', 'Event', 'Reason', 'Old XP', 'New XP']];
            snap.docs.forEach(d => {
                const l = d.data();
                const ts = l.timestamp ? (l.timestamp.toDate ? l.timestamp.toDate() : new Date(l.timestamp.seconds * 1000)).toISOString() : '';
                rows.push([ts, l.userId || '', l.action || '', l.result || '', l.targetUserId || '', l.eventName || '', l.reason || '', l.oldXP ?? '', l.newXP ?? '']);
            });
            const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            a.download = `system_logs_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
        } catch (e) { alert('Export failed'); }
    };

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function setupAutoLogout() {
        let t;
        const r = () => { clearTimeout(t); t = setTimeout(async () => { await signOut(auth); window.location.href='/public/pages/login.html'; }, 30*60*1000); };
        ['click','keypress','scroll','touchstart'].forEach(e => document.addEventListener(e, r));
        r();
    }

    window.handleLogout = async () => { await signOut(auth); window.location.href = '/public/pages/login.html'; };
</script>
</body>
</html>
