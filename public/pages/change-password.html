<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWGAME - Change Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'ng-red': '#E63946',
                        'ng-blue': '#1D3557',
                        'ng-lightblue': '#457B9D',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');
        * { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Rajdhani', sans-serif; }
        .bg-logo { position: fixed; inset: 0; background: url('../../assets/logo.png') center/cover no-repeat; filter: blur(20px) brightness(0.15); transform: scale(1.1); z-index: 0; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .fade-in { animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn-primary { background: linear-gradient(135deg, #E63946, #c1121f); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(230,57,70,0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .accent-line { height: 3px; background: linear-gradient(90deg, #E63946, #1D3557, #457B9D); border-radius: 999px; }
        .strength-bar { height: 4px; border-radius: 999px; transition: all 0.3s ease; }
        input:focus { outline: none; border-color: #E63946; box-shadow: 0 0 0 2px rgba(230,57,70,0.2); }
    </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center overflow-hidden">
    <div class="bg-logo"></div>
    <div class="fixed inset-0 z-0" style="background: radial-gradient(ellipse at top left, rgba(230,57,70,0.15) 0%, transparent 60%), radial-gradient(ellipse at bottom right, rgba(29,53,87,0.3) 0%, transparent 60%);"></div>

    <div class="relative z-10 w-full max-w-md mx-4 fade-in">
        <div class="text-center mb-8">
            <img src="../../assets/logo.png" alt="NEWGAME" class="w-20 h-20 mx-auto mb-4 drop-shadow-2xl">
            <h1 class="text-4xl font-bold text-white tracking-wider">NEWGAME</h1>
            <div class="accent-line w-24 mx-auto mt-3"></div>
        </div>

        <div class="glass rounded-2xl p-8 shadow-2xl">
            <div id="errorMsg" class="hidden bg-red-500/20 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg mb-4 text-sm">
                <span id="errorText"></span>
            </div>
            <div id="successMsg" class="hidden bg-green-500/20 border border-green-500/50 text-green-400 px-4 py-3 rounded-lg mb-4 text-sm">
                <span id="successText"></span>
            </div>

            <h2 class="text-2xl font-bold text-white mb-1">Set New Password</h2>
            <p class="text-gray-400 text-sm mb-6">Create a strong password for your account</p>

            <div class="mb-4">
                <label class="block text-gray-400 text-xs uppercase tracking-wider mb-2">New Password</label>
                <div class="relative">
                    <input type="password" id="newPassword" placeholder="Min 8 chars, uppercase, number, special"
                        class="w-full bg-white/5 text-white px-4 py-3 rounded-lg border border-white/10 transition placeholder-gray-600 pr-10"
                        oninput="checkStrength(this.value)">
                    <button type="button" onclick="togglePwd('newPassword', this)"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 text-xs">Show</button>
                </div>
            </div>

            <!-- strength indicator -->
            <div class="mb-4">
                <div class="flex gap-1 mb-2">
                    <div class="strength-bar flex-1 bg-white/10" id="b1"></div>
                    <div class="strength-bar flex-1 bg-white/10" id="b2"></div>
                    <div class="strength-bar flex-1 bg-white/10" id="b3"></div>
                    <div class="strength-bar flex-1 bg-white/10" id="b4"></div>
                </div>
                <div class="grid grid-cols-2 gap-1">
                    <p class="text-xs text-gray-500" id="c1">- Min 8 characters</p>
                    <p class="text-xs text-gray-500" id="c2">- Uppercase letter</p>
                    <p class="text-xs text-gray-500" id="c3">- Number</p>
                    <p class="text-xs text-gray-500" id="c4">- Special character</p>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-gray-400 text-xs uppercase tracking-wider mb-2">Confirm Password</label>
                <div class="relative">
                    <input type="password" id="confirmPassword" placeholder="Re-enter your password"
                        class="w-full bg-white/5 text-white px-4 py-3 rounded-lg border border-white/10 transition placeholder-gray-600 pr-10">
                    <button type="button" onclick="togglePwd('confirmPassword', this)"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 text-xs">Show</button>
                </div>
            </div>

            <button id="submitBtn" onclick="handleChangePassword()"
                class="btn-primary w-full text-white font-bold py-3 rounded-lg">
                Set Password
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, updatePassword, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, getDoc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // ============================================================
        // Konfigurasi Firebase — ganti dengan nilai asli kamu
        // ============================================================

import { initializeApp, getApps, getApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut, updatePassword } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, doc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
    // nilai asli kamu
            apiKey: "AIzaSyD6AqPbmW4UM1d1o8caBWSIi61yQsxxsGk",
            authDomain: "qr-absensi-unandnewgame.firebaseapp.com",
            projectId: "qr-absensi-unandnewgame",
            storageBucket: "qr-absensi-unandnewgame.firebasestorage.app",
            messagingSenderId: "377822320778",
            appId: "1:377822320778:web:f7305bb71019f670ccf573"
};

// Gunakan getApp() bukan getApps()[0]
        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp();
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let authReady = false;

// Cek auth — tambah emailVerified
onAuthStateChanged(auth, async (user) => {
    if (!user || !user.emailVerified) {
        window.location.href = '/public/pages/login.html';
        return;
    }
    currentUser = user;
    authReady = true;
});

window.handleChangePassword = async function() {
    // Guard clause — pastikan auth sudah siap
    if (!authReady || !currentUser) {
        showError('Session not ready. Please refresh the page.');
        return;
    }

    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (!newPassword || !confirmPassword) {
        showError('Please fill in all fields');
        return;
    }

    const checks = {
        minLength: newPassword.length >= 8,
        hasUppercase: /[A-Z]/.test(newPassword),
        hasNumber: /[0-9]/.test(newPassword),
        hasSpecial: /[!@#$%^&*]/.test(newPassword)
    };

    if (!Object.values(checks).every(Boolean)) {
        showError('Password does not meet all requirements');
        return;
    }

    if (newPassword !== confirmPassword) {
        showError('Passwords do not match');
        return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Updating...';

    try {
        await updatePassword(currentUser, newPassword);

        await updateDoc(doc(db, 'users', currentUser.uid), {
            mustChangePassword: false,
            passwordChangedAt: serverTimestamp()
        });

        showSuccess('Password updated! Redirecting...');
        
        // Redirect setelah 2 detik
        setTimeout(() => {
            window.location.href = '/public/pages/dashboard.html';
        }, 2000);

    } catch (error) {
        console.error('Change password error:', error);

        if (error.code === 'auth/requires-recent-login') {
            showError('Session expired. Please sign in again.');
            await signOut(auth);
            window.location.href = '/public/pages/login.html';
            return; // stop, jangan jalankan kode di bawah
        }

        showError('Failed to update password. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Set Password';
    }
};
        // Password strength checker
        window.checkStrength = function(password) {
            const checks = [
                password.length >= 8,
                /[A-Z]/.test(password),
                /[0-9]/.test(password),
                /[!@#$%^&*]/.test(password)
            ];
            const passed = checks.filter(Boolean).length;
            const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-green-500'];
            const labels = ['Min 8 characters', 'Uppercase letter', 'Number', 'Special character'];

            ['b1','b2','b3','b4'].forEach((id, i) => {
                document.getElementById(id).className =
                    `strength-bar flex-1 ${i < passed ? colors[passed-1] : 'bg-white/10'}`;
            });

            ['c1','c2','c3','c4'].forEach((id, i) => {
                const el = document.getElementById(id);
                el.textContent = (checks[i] ? '+ ' : '- ') + labels[i];
                el.className = `text-xs ${checks[i] ? 'text-green-400' : 'text-gray-500'}`;
            });
        };

        window.togglePwd = function(id, btn) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
            btn.textContent = input.type === 'password' ? 'Show' : 'Hide';
        };

        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMsg').classList.remove('hidden');
            document.getElementById('successMsg').classList.add('hidden');
        }

        function showSuccess(msg) {
            document.getElementById('successText').textContent = msg;
            document.getElementById('successMsg').classList.remove('hidden');
            document.getElementById('errorMsg').classList.add('hidden');
        }
    </script>
</body>
</html>
