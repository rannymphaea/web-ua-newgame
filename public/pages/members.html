<html lang="en">

    <title>NEWGAME - Members</title>

        body { background: #070910; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 99px; }

        .glass {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
        }
        .sidebar {
            width: 220px; position: fixed; left: 0; top: 0;
            height: 100%; background: rgba(7,9,16,0.95);
            border-right: 1px solid rgba(255,255,255,0.07);
            z-index: 40; display: flex; flex-direction: column;
            transition: transform 0.3s ease;
        }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 14px; border-radius: 8px;
            color: #6b7280; font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.2s; text-decoration: none;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active { background: rgba(230,57,70,0.15); color: #E63946; border-left: 2px solid #E63946; }
        .btn-primary {
            background: linear-gradient(135deg,#E63946,#c1121f);
            color: white; font-weight: 600; padding: 8px 16px;
            border-radius: 8px; font-size: 13px; border: none;
            cursor: pointer; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(230,57,70,0.35); }
        .btn-secondary {
            background: rgba(255,255,255,0.07); color: #d1d5db;
            font-weight: 500; padding: 7px 14px; border-radius: 8px;
            font-size: 13px; border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.12); color: white; }
        .input-field {
            background: rgba(255,255,255,0.05); color: white;
            padding: 9px 13px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1); font-size: 13px;
            transition: all 0.2s; width: 100%;
        }
        .input-field:focus { outline: none; border-color: #E63946; box-shadow: 0 0 0 2px rgba(230,57,70,0.2); }
        .input-field::placeholder { color: #4b5563; }
        select.input-field option { background: #111827; }
        .badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; }

        /* Status badges */
        .badge-active    { background: rgba(34,197,94,0.15);  color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
        .badge-afk       { background: rgba(234,179,8,0.15);  color: #facc15; border: 1px solid rgba(234,179,8,0.3); }
        .badge-npc       { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
        .badge-resign    { background: rgba(220,38,38,0.15);  color: #f87171; border: 1px solid rgba(220,38,38,0.3); }
        .badge-glory     { background: rgba(250,204,21,0.15); color: #fbbf24; border: 1px solid rgba(250,204,21,0.3); }
        .badge-freeze    { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid rgba(96,165,250,0.3); }
        .badge-rip       { background: rgba(75,85,99,0.3);    color: #9ca3af; border: 1px solid rgba(75,85,99,0.4); }

        /* Role/Team badges */
        .role-core       { background: rgba(250,204,21,0.15); color: #fbbf24; border: 1px solid rgba(250,204,21,0.3); }
        .role-project    { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
        .role-training   { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
        .role-familygame { background: rgba(249,115,22,0.15); color: #fb923c; border: 1px solid rgba(249,115,22,0.3); }
        .role-alliance   { background: rgba(168,85,247,0.15); color: #c084fc; border: 1px solid rgba(168,85,247,0.3); }
        .role-inventory  { background: rgba(20,184,166,0.15); color: #2dd4bf; border: 1px solid rgba(20,184,166,0.3); }
        .role-designcraft{ background: rgba(244,63,94,0.15);  color: #fb7185; border: 1px solid rgba(244,63,94,0.3); }
        .role-newmember  { background: rgba(255,255,255,0.08);color: #9ca3af; border: 1px solid rgba(255,255,255,0.15); }
        .role-npc        { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
        .role-unknown    { background: rgba(75,85,99,0.2);    color: #6b7280; border: 1px solid rgba(75,85,99,0.3); }

        /* Pillar badges */
        .pillar-gl { background: rgba(230,57,70,0.15);  color: #E63946; border: 1px solid rgba(230,57,70,0.3); }
        .pillar-gd { background: rgba(29,53,87,0.4);    color: #90b4ce; border: 1px solid rgba(69,123,157,0.4); }
        .pillar-gs { background: rgba(71,143,87,0.2);   color: #6fcf97; border: 1px solid rgba(71,143,87,0.4); }

        .data-table { width: 100%; border-collapse: separate; border-spacing: 0; }
        .data-table thead th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #6b7280; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .data-table tbody tr:hover { background: rgba(255,255,255,0.03); }
        .data-table tbody td { padding: 11px 14px; font-size: 13px; color: #d1d5db; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .modal-overlay { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: #0f1117; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 28px; width: 100%; max-width: 520px; }
        .toast { position: fixed; bottom: 24px; right: 24px; z-index: 100; padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; animation: toastIn 0.3s ease; min-width: 260px; }

        @media(max-width:768px){ .sidebar{ transform: translateX(-100%); } .sidebar.open{ transform: translateX(0); } .main{ margin-left:0!important; } }

                <div class="flex items-center gap-2">

                </div>
            </div>
            <div class="overflow-x-auto">

                    <tbody id="tableBody">

</div>

let allMembers = [...CSV_PLAYERS];
let filteredMembers = [...CSV_PLAYERS];
let currentPage = 1;
const PAGE_SIZE = 20;
let sortKey = 'no';
let sortAsc = true;

// ============================================================
// Init
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
    renderStats();
    filterTable();
});

// ============================================================
// Stats
// ============================================================
function renderStats() {
    const total  = allMembers.length;
    const active = allMembers.filter(m => m.status === 'ACTIVE').length;
    const afk    = allMembers.filter(m => m.status === 'AFK').length;
    const npc    = allMembers.filter(m => m.status === 'NPC').length;

    const cards = [
        {label:'Total Players', value: total,  color:'text-white',      bg:'rgba(255,255,255,0.05)'},
        {label:'Active',        value: active, color:'text-green-400',  bg:'rgba(34,197,94,0.07)'},
        {label:'AFK',           value: afk,    color:'text-yellow-400', bg:'rgba(234,179,8,0.07)'},
        {label:'NPC',           value: npc,    color:'text-purple-400', bg:'rgba(139,92,246,0.07)'},
    ];
    document.getElementById('statsRow').innerHTML = cards.map(c => `
        <div class="glass rounded-xl p-4" style="background:${c.bg}">
            <p class="text-gray-500 text-xs uppercase tracking-wider mb-1">${c.label}</p>
            <p class="text-2xl font-bold ${c.color}" style="font-family:'Rajdhani',sans-serif;">${c.value}</p>
        </div>
    `).join('');
}

// ============================================================
// Filter & Sort
// ============================================================
window.filterTable = function() {
    const search  = document.getElementById('searchInput').value.toLowerCase();
    const pillar  = document.getElementById('filterPillar').value;
    const status  = document.getElementById('filterStatus').value;
    const team    = document.getElementById('filterTeam').value;
    const gen     = document.getElementById('filterGen').value;

    filteredMembers = allMembers.filter(m => {
        const matchSearch = !search ||
            m.name.toLowerCase().includes(search) ||
            m.id.toLowerCase().includes(search);
        const matchPillar = !pillar  || m.pillar === pillar;
        const matchStatus = !status  || m.status === status;
        const matchTeam   = !team    || m.team   === team;
        const matchGen    = !gen     || m.gen    === gen;
        return matchSearch && matchPillar && matchStatus && matchTeam && matchGen;
    });

    filteredMembers.sort((a, b) => {
        let av = a[sortKey] ?? '';
        let bv = b[sortKey] ?? '';
        if (typeof av === 'string') av = av.toLowerCase();
        if (typeof bv === 'string') bv = bv.toLowerCase();
        if (av < bv) return sortAsc ? -1 : 1;
        if (av > bv) return sortAsc ?  1 : -1;
        return 0;
    });

    currentPage = 1;
    renderTable();
};

window.sortTable = function(key) {
    if (sortKey === key) sortAsc = !sortAsc;
    else { sortKey = key; sortAsc = true; }
    document.querySelectorAll('[id^="sort-"]').forEach(el => el.textContent = '');
    document.getElementById(`sort-${key}`).textContent = sortAsc ? '↑' : '↓';
    filterTable();
};

// ============================================================
// Render
// ============================================================
function renderTable() {
    const start = (currentPage - 1) * PAGE_SIZE;
    const end   = start + PAGE_SIZE;
    const page  = filteredMembers.slice(start, end);
    const total = filteredMembers.length;

    document.getElementById('tableCountLabel').textContent = `${total} player${total !== 1 ? 's' : ''} found`;
    document.getElementById('paginationInfo').textContent  = `Showing ${Math.min(start+1,total)}–${Math.min(end,total)} of ${total}`;
    document.getElementById('btnPrev').disabled = currentPage === 1;
    document.getElementById('btnNext').disabled = end >= total;

    if (page.length === 0) {
        document.getElementById('tableBody').innerHTML =
            '<tr><td colspan="8" class="text-center text-gray-500 py-10">No players match the filter</td></tr>';
        return;
    }

    document.getElementById('tableBody').innerHTML = page.map(m => `
        <tr>
            <td class="mono text-xs text-gray-600">${m.no}</td>
            <td>
                <div class="flex items-center gap-2">
                    <div class="w-7 h-7 rounded-full flex items-center justify-center font-bold text-xs flex-shrink-0 ${pillArBg(m.pillar)}">
                        ${m.name[0].toUpperCase()}
                    </div>
                    <p class="text-white font-medium text-sm">${esc(m.name)}</p>
                </div>
            </td>
            <td class="mono text-xs text-gray-400">${esc(m.id)}</td>
            <td><span class="badge ${pillArClass(m.pillar)}">${pillarShort(m.pillar)}</span></td>
            <td class="text-xs text-gray-400">${m.gen}</td>
            <td>${teamBadge(m.team)}</td>
            <td>${statusBadge(m.status)}</td>
            <td>
                <button onclick="viewDetail(${m.no})" class="btn-secondary text-xs py-1 px-2">View</button>
            </td>
        </tr>
    `).join('');
}

window.prevPage = () => { if (currentPage > 1) { currentPage--; renderTable(); } };
window.nextPage = () => { if (currentPage * PAGE_SIZE < filteredMembers.length) { currentPage++; renderTable(); } };

window.viewDetail = function(no) {

    if (!m) return;

        <div class="flex items-center gap-4 mb-5">
            <div class="w-14 h-14 rounded-xl flex items-center justify-center text-white font-bold text-2xl ${pillArBg(m.pillar)}">

            <div>

                <p class="mono text-gray-400 text-xs mt-0.5">${esc(m.id)}</p>
                <div class="flex gap-2 mt-1.5">
                    ${statusBadge(m.status)}

            </div>

            <div class="bg-white/5 rounded-lg p-3">

                <p class="text-white">${m.pillar}</p>
            </div>
            <div class="bg-white/5 rounded-lg p-3">

                ${teamBadge(m.team)}

            <div class="bg-white/5 rounded-lg p-3 col-span-2">
                <p class="text-gray-500 text-xs uppercase tracking-wider mb-1">ID Player</p>
                <p class="text-white mono text-sm">${esc(m.id)}</p>
                <p class="text-gray-600 text-xs mt-1">${parseIdDesc(m.id)}</p>
            </div>
        </div>
    `;
    openModal('modalDetail');
};

// Parse ID description
function parseIdDesc(id) {
    const pillarCode = id.slice(-2);
    const pillarMap = {GL:'Game Logic', GD:'Game Design', SF:'Game Sound', PG:'Game Logic (PG)'};
    const jalurMap = {'1':'Royal Recruitment','2':'Solo Initiators','3':'Talent Trappers'};
    try {
        const gen   = id[2]; // 1 or 2
        const jalur = id[3]; // recruitment path
        const desc  = `Gen ${gen} · Jalur: ${jalurMap[jalur]||jalur} · Pillar: ${pillarMap[pillarCode]||pillarCode}`;
        return desc;
    } catch(e) { return ''; }
}

// ============================================================
// Export CSV
// ============================================================
window.exportCSV = function() {
    const rows = [['No','Name','ID Player','Pillar','Gen','Team/Role S5','Status']];
    filteredMembers.forEach(m => rows.push([m.no, m.name, m.id, m.pillar, m.gen, m.team, m.status]));
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a   = document.createElement('a');
    a.href    = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    a.download= `newgame_players_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    showToast('Players exported', 'success');
};

// ============================================================
// Helpers
// ============================================================
function pillArBg(p) {
    if (p==='Game Logic')  return 'bg-red-500/20 border border-red-500/30 text-red-400';
    if (p==='Game Design') return 'bg-blue-900/30 border border-blue-700/30 text-blue-300';
    if (p==='Game Sound')  return 'bg-green-900/20 border border-green-700/30 text-green-300';
    return 'bg-gray-800 text-gray-400';
}
function pillArClass(p) {
    if (p==='Game Logic')  return 'pillar-gl';
    if (p==='Game Design') return 'pillar-gd';
    if (p==='Game Sound')  return 'pillar-gs';
    return 'role-unknown';
}
function pillarShort(p) {
    if (p==='Game Logic')  return 'GL';
    if (p==='Game Design') return 'GD';
    if (p==='Game Sound')  return 'GS';
    return p || '-';
}
function statusBadge(s) {
    const map = {
        ACTIVE:'badge-active', AFK:'badge-afk', NPC:'badge-npc',
        RESIGN:'badge-resign', GLORY:'badge-glory', FREEZE:'badge-freeze', RIP:'badge-rip'
    };
    const cls = map[s] || 'role-unknown';
    return `<span class="badge ${cls}">${s||'-'}</span>`;
}
function teamBadge(t) {
    if (!t || t === '?????' || t === '-' || t === '') return `<span class="text-gray-600 text-xs">—</span>`;
    const map = {
        Core:'role-core', Project:'role-project', Training:'role-training',
        FamilyGame:'role-familygame', Alliance:'role-alliance', Inventory:'role-inventory',
        DesignCraft:'role-designcraft', NewMember:'role-newmember', NPC:'role-npc'
    };
    const cls = map[t] || 'role-unknown';
    return `<span class="badge ${cls}">${t}</span>`;
}

window.openModal  = id => document.getElementById(id).classList.add('show');
window.closeModal = id => document.getElementById(id).classList.remove('show');

function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg, type='success') {
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.innerHTML = `<span>${esc(msg)}</span>`;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 3500);
}
