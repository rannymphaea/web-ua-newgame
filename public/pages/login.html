<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Absensi QR</title>
    <!-- Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Konfigurasi dark mode Tailwind -->
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center">

    <!-- CARD LOGIN -->
    <div class="bg-gray-900 p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4">
        
        <!-- LOGO & JUDUL -->
        <div class="text-center mb-8">
            <div class="text-5xl mb-3">📋</div>
            <h1 class="text-2xl font-bold text-white">Absensi QR</h1>
            <p class="text-gray-400 text-sm mt-1">Masuk ke akun organisasimu</p>
        </div>

        <!-- PESAN ERROR -->
        <div id="errorMsg" class="hidden bg-red-500/20 border border-red-500 text-red-400 px-4 py-3 rounded-lg mb-4 text-sm">
        </div>

        <!-- PESAN SUKSES -->
        <div id="successMsg" class="hidden bg-green-500/20 border border-green-500 text-green-400 px-4 py-3 rounded-lg mb-4 text-sm">
        </div>

        <!-- FORM LOGIN -->
        <div id="loginForm">
            <div class="mb-4">
                <label class="block text-gray-400 text-sm mb-2">Email</label>
                <input 
                    type="email" 
                    id="emailInput"
                    placeholder="email@kamu.com"
                    class="w-full bg-gray-800 text-white px-4 py-3 rounded-lg border border-gray-700 focus:border-blue-500 focus:outline-none transition"
                >
            </div>
            <div class="mb-6">
                <label class="block text-gray-400 text-sm mb-2">Password</label>
                <input 
                    type="password" 
                    id="passwordInput"
                    placeholder="••••••••"
                    class="w-full bg-gray-800 text-white px-4 py-3 rounded-lg border border-gray-700 focus:border-blue-500 focus:outline-none transition"
                >
            </div>

            <!-- TOMBOL LOGIN -->
            <button 
                id="loginBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition mb-3"
            >
                Masuk
            </button>

            <!-- TOMBOL GOOGLE -->
            <button 
                id="googleBtn"
                class="w-full bg-gray-800 hover:bg-gray-700 text-white font-semibold py-3 rounded-lg border border-gray-700 transition flex items-center justify-center gap-2"
            >
                <img src="https://www.google.com/favicon.ico" class="w-4 h-4">
                Masuk dengan Google
            </button>

            <!-- LINK DAFTAR -->
            <p class="text-center text-gray-400 text-sm mt-4">
                Belum punya akun? 
                <span id="showRegister" class="text-blue-400 cursor-pointer hover:underline">Daftar</span>
            </p>
        </div>

        <!-- FORM REGISTER -->
        <div id="registerForm" class="hidden">
            <div class="mb-4">
                <label class="block text-gray-400 text-sm mb-2">Nama Lengkap</label>
                <input 
                    type="text" 
                    id="nameInput"
                    placeholder="Nama kamu"
                    class="w-full bg-gray-800 text-white px-4 py-3 rounded-lg border border-gray-700 focus:border-blue-500 focus:outline-none transition"
                >
            </div>
            <div class="mb-4">
                <label class="block text-gray-400 text-sm mb-2">Email</label>
                <input 
                    type="email" 
                    id="regEmailInput"
                    placeholder="email@kamu.com"
                    class="w-full bg-gray-800 text-white px-4 py-3 rounded-lg border border-gray-700 focus:border-blue-500 focus:outline-none transition"
                >
            </div>
            <div class="mb-6">
                <label class="block text-gray-400 text-sm mb-2">Password</label>
                <input 
                    type="password" 
                    id="regPasswordInput"
                    placeholder="Minimal 8 karakter"
                    class="w-full bg-gray-800 text-white px-4 py-3 rounded-lg border border-gray-700 focus:border-blue-500 focus:outline-none transition"
                >
            </div>

            <button 
                id="registerBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition mb-3"
            >
                Daftar
            </button>

            <p class="text-center text-gray-400 text-sm mt-4">
                Sudah punya akun? 
                <span id="showLogin" class="text-blue-400 cursor-pointer hover:underline">Masuk</span>
            </p>
        </div>

    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { 
            getAuth, 
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            sendEmailVerification,
            signInWithPopup,
            GoogleAuthProvider,
            onAuthStateChanged
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import {
            getFirestore,
            doc,
            setDoc,
            getDoc,
            serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // ==========================================
        // KONFIGURASI FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyD6AqPbmW4UM1d1o8caBWSIi61yQsxxsGk",
            authDomain: "qr-absensi-unandnewgame.firebaseapp.com",
            projectId: "qr-absensi-unandnewgame",
            storageBucket: "qr-absensi-unandnewgame.firebasestorage.app",
            messagingSenderId: "377822320778",
            appId: "1:377822320778:web:f7305bb71019f670ccf573",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==========================================
        // CEK JIKA USER SUDAH LOGIN
        // Jika sudah login dan email verified → langsung ke dashboard
        // ==========================================
        onAuthStateChanged(auth, async (user) => {
            if (user && user.emailVerified) {
                window.location.href = '/public/pages/dashboard.html';
            }
        });

        // ==========================================
        // FUNGSI HELPER — TAMPILKAN PESAN
        // ==========================================
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        // ==========================================
        // TOGGLE FORM LOGIN / REGISTER
        // ==========================================
        document.getElementById('showRegister').addEventListener('click', () => {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        });

        document.getElementById('showLogin').addEventListener('click', () => {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        });

        // ==========================================
        // LOGIN DENGAN EMAIL & PASSWORD
        // ==========================================
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;

            // Validasi input kosong
            if (!email || !password) {
                showError('Email dan password tidak boleh kosong');
                return;
            }

            try {
                document.getElementById('loginBtn').textContent = 'Memuat...';
                
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Cek email sudah diverifikasi
                if (!user.emailVerified) {
                    showError('Email belum diverifikasi. Cek inbox emailmu.');
                    await auth.signOut();
                    return;
                }

                // Update session token untuk deteksi multi-login
                await setDoc(doc(db, 'users', user.uid), {
                    lastLogin: serverTimestamp(),
                    sessionToken: crypto.randomUUID()
                }, { merge: true });

                window.location.href = '/public/pages/dashboard.html';

            } catch (error) {
                // Pesan error yang ramah pengguna
                if (error.code === 'auth/invalid-credential') {
                    showError('Email atau password salah');
                } else if (error.code === 'auth/too-many-requests') {
                    showError('Terlalu banyak percobaan. Coba lagi nanti');
                } else {
                    showError('Terjadi kesalahan. Coba lagi');
                }
            } finally {
                document.getElementById('loginBtn').textContent = 'Masuk';
            }
        });

        // ==========================================
        // LOGIN DENGAN GOOGLE
        // ==========================================
        document.getElementById('googleBtn').addEventListener('click', async () => {
            try {
                const provider = new GoogleAuthProvider();
                const userCredential = await signInWithPopup(auth, provider);
                const user = userCredential.user;

                // Cek apakah user baru atau sudah ada
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                
                if (!userDoc.exists()) {
                    // Buat dokumen user baru dengan role default member
                    await setDoc(doc(db, 'users', user.uid), {
                        uid: user.uid,
                        displayName: user.displayName,
                        email: user.email,
                        role: 'member',
                        xpCache: 0,
                        status: 'active',
                        createdAt: serverTimestamp(),
                        lastLogin: serverTimestamp(),
                        sessionToken: crypto.randomUUID()
                    });
                } else {
                    // Update login terakhir
                    await setDoc(doc(db, 'users', user.uid), {
                        lastLogin: serverTimestamp(),
                        sessionToken: crypto.randomUUID()
                    }, { merge: true });
                }

                window.location.href = '/public/pages/dashboard.html';

            } catch (error) {
                if (error.code === 'auth/popup-closed-by-user') {
                    showError('Login dibatalkan');
                } else {
                    showError('Gagal login dengan Google. Coba lagi');
                }
            }
        });

        // ==========================================
        // REGISTER AKUN BARU
        // ==========================================
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const name = document.getElementById('nameInput').value.trim();
            const email = document.getElementById('regEmailInput').value.trim();
            const password = document.getElementById('regPasswordInput').value;

            // Validasi input
            if (!name || !email || !password) {
                showError('Semua kolom wajib diisi');
                return;
            }

            if (password.length < 8) {
                showError('Password minimal 8 karakter');
                return;
            }

            try {
                document.getElementById('registerBtn').textContent = 'Memuat...';

                // Buat akun di Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Kirim email verifikasi
                await sendEmailVerification(user);

                // Simpan data user ke Firestore dengan role default member
                await setDoc(doc(db, 'users', user.uid), {
                    uid: user.uid,
                    displayName: name,
                    email: email,
                    role: 'member',
                    xpCache: 0,
                    status: 'active',
                    createdAt: serverTimestamp(),
                    lastLogin: serverTimestamp(),
                    sessionToken: crypto.randomUUID()
                });

                // Logout dulu — user harus verifikasi email sebelum bisa masuk
                await auth.signOut();

                showSuccess('Akun berhasil dibuat! Cek email untuk verifikasi sebelum login.');

            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    showError('Email sudah terdaftar');
                } else if (error.code === 'auth/weak-password') {
                    showError('Password terlalu lemah');
                } else if (error.code === 'auth/invalid-email') {
                    showError('Format email tidak valid');
                } else {
                    showError('Gagal membuat akun. Coba lagi');
                }
            } finally {
                document.getElementById('registerBtn').textContent = 'Daftar';
            }
        });
    </script>

</body>
</html>
