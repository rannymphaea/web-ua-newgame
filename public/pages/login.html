<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWGAME - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'ng-red': '#E63946',
                        'ng-blue': '#1D3557',
                        'ng-lightblue': '#457B9D',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');

        * { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Rajdhani', sans-serif; }

        /* Background logo blur */
        .bg-logo {
            position: fixed;
            inset: 0;
            background: url('../../assets/logo unandnewgame.png') center/cover no-repeat;
            filter: blur(20px) brightness(0.15);
            transform: scale(1.1);
            z-index: 0;
        }

        /* Glassmorphism card */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Animasi fade in */
        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glow merah pada focus input */
        input:focus {
            box-shadow: 0 0 0 2px rgba(230, 57, 70, 0.5);
        }

        /* Gradient tombol */
        .btn-primary {
            background: linear-gradient(135deg, #E63946, #c1121f);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #c1121f, #E63946);
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(230, 57, 70, 0.4);
        }

        .btn-google {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.3s ease;
        }
        .btn-google:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-1px);
        }

        /* Garis dekorasi merah-biru */
        .accent-line {
            height: 3px;
            background: linear-gradient(90deg, #E63946, #1D3557, #457B9D);
            border-radius: 999px;
        }
    </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center overflow-hidden">

    <!-- BACKGROUND BLUR LOGO -->
    <div class="bg-logo"></div>

    <!-- OVERLAY GRADIENT -->
    <div class="fixed inset-0 z-0" style="background: radial-gradient(ellipse at top left, rgba(230,57,70,0.15) 0%, transparent 60%), radial-gradient(ellipse at bottom right, rgba(29,53,87,0.3) 0%, transparent 60%);"></div>

    <!-- MAIN CARD -->
    <div class="relative z-10 w-full max-w-md mx-4 fade-in">

        <!-- LOGO & BRAND -->
        <div class="text-center mb-8">
            <img src="../../assets/logo unandnewgame.png" alt="NEWGAME" class="w-20 h-20 mx-auto mb-4 drop-shadow-2xl">
            <h1 class="text-4xl font-bold text-white tracking-wider">NEWGAME</h1>
            <p class="text-gray-400 text-sm tracking-widest uppercase mt-1">Learn Create Play</p>
            <div class="accent-line w-24 mx-auto mt-3"></div>
        </div>

        <!-- CARD -->
        <div class="glass rounded-2xl p-8 shadow-2xl">

            <!-- PESAN ERROR -->
            <div id="errorMsg" class="hidden bg-red-500/20 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg mb-4 text-sm flex items-center gap-2">
                <span></span>
                <span id="errorText"></span>
            </div>

            <!-- PESAN SUKSES -->
            <div id="successMsg" class="hidden bg-green-500/20 border border-green-500/50 text-green-400 px-4 py-3 rounded-lg mb-4 text-sm flex items-center gap-2">
                <span>✅</span>
                <span id="successText"></span>
            </div>

            <!-- FORM LOGIN -->
            <div id="loginForm">
                <h2 class="text-2xl font-bold text-white mb-6">Masuk</h2>

                <div class="mb-4">
                    <label class="block text-gray-400 text-xs uppercase tracking-wider mb-2">Email</label>
                    <input
                        type="email"
                        id="emailInput"
                        placeholder="email@kamu.com"
                        class="w-full bg-white/5 text-white px-4 py-3 rounded-lg border border-white/10 focus:border-ng-red focus:outline-none transition placeholder-gray-600"
                    >
                </div>

                <div class="mb-6">
                    <label class="block text-gray-400 text-xs uppercase tracking-wider mb-2">Password</label>
                    <input
                        type="password"
                        id="passwordInput"
                        placeholder="••••••••"
                        class="w-full bg-white/5 text-white px-4 py-3 rounded-lg border border-white/10 focus:border-ng-red focus:outline-none transition placeholder-gray-600"
                    >
                </div>

                <button id="loginBtn" class="btn-primary w-full text-white font-bold py-3 rounded-lg mb-3">
                    Masuk
                </button>

                <button id="googleBtn" class="btn-google w-full text-white font-semibold py-3 rounded-lg flex items-center justify-center gap-2">
                    <img src="https://www.google.com/favicon.ico" class="w-4 h-4">
                    Masuk dengan Google
                </button>

                <p class="text-center text-gray-500 text-sm mt-6">
                    Belum punya akun?
                    <span id="showRegister" class="text-ng-red cursor-pointer hover:text-red-400 font-semibold transition">Daftar</span>
                </p>
            </div>

            <!-- FORM REGISTER -->
            <div id="registerForm" class="hidden">
                <h2 class="text-2xl font-bold text-white mb-6">Daftar</h2>

                <div class="mb-4">
                    <label class="block text-gray-400 text-xs uppercase tracking-wider mb-2">Nama Lengkap</label>
                    <input
                        type="text"
                        id="nameInput"
                        placeholder="Nama kamu"
                        class="w-full bg-white/5 text-white px-4 py-3 rounded-lg border border-white/10 focus:border-ng-red focus:outline-none transition placeholder-gray-600"
                    >
                </div>

                <div class="mb-4">
                    <label class="block text-gray-400 text-xs uppercase tracking-wider mb-2">Email</label>
                    <input
                        type="email"
                        id="regEmailInput"
                        placeholder="email@kamu.com"
                        class="w-full bg-white/5 text-white px-4 py-3 rounded-lg border border-white/10 focus:border-ng-red focus:outline-none transition placeholder-gray-600"
                    >
                </div>

                <div class="mb-6">
                    <label class="block text-gray-400 text-xs uppercase tracking-wider mb-2">Password</label>
                    <input
                        type="password"
                        id="regPasswordInput"
                        placeholder="Minimal 8 karakter"
                        class="w-full bg-white/5 text-white px-4 py-3 rounded-lg border border-white/10 focus:border-ng-red focus:outline-none transition placeholder-gray-600"
                    >
                </div>

                <button id="registerBtn" class="btn-primary w-full text-white font-bold py-3 rounded-lg mb-3">
                    Daftar
                </button>

                <p class="text-center text-gray-500 text-sm mt-6">
                    Sudah punya akun?
                    <span id="showLogin" class="text-ng-red cursor-pointer hover:text-red-400 font-semibold transition">Masuk</span>
                </p>
            </div>

        </div>

        <!-- FOOTER -->
        <p class="text-center text-gray-600 text-xs mt-6">© 2026 NEWGAME Organization</p>

    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import {
            getAuth,
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            sendEmailVerification,
            signInWithPopup,
            GoogleAuthProvider,
            onAuthStateChanged
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import {
            getFirestore,
            doc,
            setDoc,
            getDoc,
            serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // ==========================================
        // KONFIGURASI FIREBASE — ganti dengan milikmu
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyD6AqPbmW4UM1d1o8caBWSIi61yQsxxsGk",
            authDomain: "qr-absensi-unandnewgame.firebaseapp.com",
            projectId: "qr-absensi-unandnewgame",
            storageBucket: "qr-absensi-unandnewgame.firebasestorage.app",
            messagingSenderId: "377822320778",
            appId: "1:377822320778:web:f7305bb71019f670ccf573"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Cek jika sudah login
        onAuthStateChanged(auth, async (user) => {
            if (user && user.emailVerified) {
                window.location.href = '/public/pages/dashboard.html';
            }
        });

        // Helper tampilkan pesan
        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMsg').classList.remove('hidden');
            document.getElementById('successMsg').classList.add('hidden');
            setTimeout(() => document.getElementById('errorMsg').classList.add('hidden'), 5000);
        }

        function showSuccess(msg) {
            document.getElementById('successText').textContent = msg;
            document.getElementById('successMsg').classList.remove('hidden');
            document.getElementById('errorMsg').classList.add('hidden');
        }

        // Toggle form
        document.getElementById('showRegister').addEventListener('click', () => {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        });

        document.getElementById('showLogin').addEventListener('click', () => {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        });

        // Login email
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;

            if (!email || !password) { showError('Email dan password tidak boleh kosong'); return; }

            try {
                document.getElementById('loginBtn').textContent = 'Memuat...';
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                if (!user.emailVerified) {
                    showError('Email belum diverifikasi. Cek inbox emailmu.');
                    await auth.signOut();
                    return;
                }

                await setDoc(doc(db, 'users', user.uid), {
                    lastLogin: serverTimestamp(),
                    sessionToken: crypto.randomUUID()
                }, { merge: true });

                window.location.href = '/public/pages/dashboard.html';

            } catch (error) {
                if (error.code === 'auth/invalid-credential') showError('Email atau password salah');
                else if (error.code === 'auth/too-many-requests') showError('Terlalu banyak percobaan. Coba lagi nanti');
                else showError('Terjadi kesalahan. Coba lagi');
            } finally {
                document.getElementById('loginBtn').textContent = 'Masuk';
            }
        });

        // Login Google
        document.getElementById('googleBtn').addEventListener('click', async () => {
            try {
                const provider = new GoogleAuthProvider();
                const userCredential = await signInWithPopup(auth, provider);
                const user = userCredential.user;

                const userDoc = await getDoc(doc(db, 'users', user.uid));

                if (!userDoc.exists()) {
                    await setDoc(doc(db, 'users', user.uid), {
                        uid: user.uid,
                        displayName: user.displayName,
                        email: user.email,
                        role: 'member',
                        xpCache: 0,
                        status: 'active',
                        createdAt: serverTimestamp(),
                        lastLogin: serverTimestamp(),
                        sessionToken: crypto.randomUUID()
                    });
                } else {
                    await setDoc(doc(db, 'users', user.uid), {
                        lastLogin: serverTimestamp(),
                        sessionToken: crypto.randomUUID()
                    }, { merge: true });
                }

                window.location.href = '/public/pages/dashboard.html';

            } catch (error) {
                if (error.code === 'auth/popup-closed-by-user') showError('Login dibatalkan');
                else showError('Gagal login dengan Google. Coba lagi');
            }
        });

        // Register
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const name = document.getElementById('nameInput').value.trim();
            const email = document.getElementById('regEmailInput').value.trim();
            const password = document.getElementById('regPasswordInput').value;

            if (!name || !email || !password) { showError('Semua kolom wajib diisi'); return; }
            if (password.length < 8) { showError('Password minimal 8 karakter'); return; }

            try {
                document.getElementById('registerBtn').textContent = 'Memuat...';
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await sendEmailVerification(user);

                await setDoc(doc(db, 'users', user.uid), {
                    uid: user.uid,
                    displayName: name,
                    email: email,
                    role: 'member',
                    xpCache: 0,
                    status: 'active',
                    createdAt: serverTimestamp(),
                    lastLogin: serverTimestamp(),
                    sessionToken: crypto.randomUUID()
                });

                await auth.signOut();
                showSuccess('Akun berhasil dibuat! Cek email untuk verifikasi sebelum login.');

            } catch (error) {
                if (error.code === 'auth/email-already-in-use') showError('Email sudah terdaftar');
                else if (error.code === 'auth/weak-password') showError('Password terlalu lemah');
                else if (error.code === 'auth/invalid-email') showError('Format email tidak valid');
                else showError('Gagal membuat akun. Coba lagi');
            } finally {
                document.getElementById('registerBtn').textContent = 'Daftar';
            }
        });
    </script>

</body>
</html>
