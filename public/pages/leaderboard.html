<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWGAME - Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { 'ng-red': '#E63946', 'ng-blue': '#1D3557', 'ng-lightblue': '#457B9D' } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');
        * { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Rajdhani', sans-serif; }
        .bg-logo { position: fixed; inset: 0; background: url('../../assets/logo unandnewgame.png') center/cover no-repeat; filter: blur(40px) brightness(0.08); transform: scale(1.2); z-index: 0; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .glass-dark { background: rgba(0,0,0,0.3); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); }
        .fade-in { animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .nav-link { transition: all 0.2s ease; }
        .nav-link:hover { background: rgba(230,57,70,0.15); color: #E63946; }
        .nav-link.active { background: rgba(230,57,70,0.2); color: #E63946; border-left: 3px solid #E63946; }
        .accent-line { height: 2px; background: linear-gradient(90deg, #E63946, #1D3557, #457B9D); border-radius: 999px; }
        #sidebar { transition: transform 0.3s ease; }
        @media (max-width: 768px) {
            #sidebar { position: fixed; left: 0; top: 0; height: 100vh; z-index: 50; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
        }
        .rank-1 { background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05)); border-color: rgba(255,215,0,0.3); }
        .rank-2 { background: linear-gradient(135deg, rgba(192,192,192,0.15), rgba(192,192,192,0.05)); border-color: rgba(192,192,192,0.3); }
        .rank-3 { background: linear-gradient(135deg, rgba(205,127,50,0.15), rgba(205,127,50,0.05)); border-color: rgba(205,127,50,0.3); }
        .leaderboard-item { transition: transform 0.2s ease; }
        .leaderboard-item:hover { transform: translateX(4px); }
    </style>
</head>
<body class="bg-black min-h-screen text-white overflow-x-hidden">
    <div class="bg-logo"></div>
    <div class="fixed inset-0 z-0" style="background: radial-gradient(ellipse at top left, rgba(230,57,70,0.1) 0%, transparent 50%), radial-gradient(ellipse at bottom right, rgba(29,53,87,0.2) 0%, transparent 50%);"></div>
    <div id="overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden" onclick="closeSidebar()"></div>

    <div class="relative z-10 flex min-h-screen">
        <aside id="sidebar" class="glass-dark w-64 min-h-screen flex flex-col p-6 md:relative md:transform-none">
            <div class="flex items-center gap-3 mb-8">
                <img src="../../assets/logo unandnewgame.png" alt="NEWGAME" class="w-10 h-10">
                <div><h1 class="text-xl font-bold tracking-wider">NEWGAME</h1><p class="text-gray-500 text-xs">Learn Create Play</p></div>
            </div>
            <div class="accent-line mb-6"></div>
            <nav class="flex-1 space-y-1">
                <a href="/public/pages/dashboard.html" class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-400"><span>🏠</span> Dashboard</a>
                <a href="/public/pages/leaderboard.html" class="nav-link active flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium"><span>🏆</span> Leaderboard</a>
                <a href="/index.html" class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-400"><span>📋</span> Absensi</a>
                <a id="adminLink" href="/public/pages/admin.html" class="nav-link hidden flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-400"><span>⚙️</span> Admin Panel</a>
                <a id="logsLink" href="/public/pages/logs.html" class="nav-link hidden flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-400"><span>📊</span> Logs</a>
            </nav>
            <div class="mt-auto">
                <div class="accent-line mb-4"></div>
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-9 h-9 rounded-full bg-ng-red flex items-center justify-center text-sm font-bold" id="avatarInitial">?</div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold truncate" id="sidebarName">Memuat...</p>
                        <p class="text-xs text-gray-500 truncate" id="sidebarRole">-</p>
                    </div>
                </div>
                <button id="logoutBtn" class="w-full text-left px-4 py-2 rounded-lg text-sm text-gray-400 hover:text-red-400 hover:bg-red-500/10 transition flex items-center gap-2"><span>🚪</span> Keluar</button>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-8 fade-in">
            <div class="flex items-center justify-between mb-6 md:hidden">
                <button onclick="openSidebar()" class="text-gray-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <img src="../../assets/logo unandnewgame.png" alt="NEWGAME" class="w-8 h-8">
                <div class="w-6"></div>
            </div>

            <div class="mb-8">
                <h2 class="text-3xl font-bold">Leaderboard 🏆</h2>
                <p class="text-gray-400 mt-1">Ranking XP semua anggota NEWGAME</p>
            </div>

            <!-- TOP 3 PODIUM -->
            <div id="podium" class="grid grid-cols-3 gap-4 mb-8"></div>

            <!-- FULL LEADERBOARD -->
            <div class="glass rounded-xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold">Semua Anggota</h3>
                    <span id="totalMembers" class="text-gray-400 text-sm">- anggota</span>
                </div>
                <div id="leaderboardList">
                    <p class="text-gray-500 text-sm text-center py-8">Memuat leaderboard...</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, getDoc, collection, query, orderBy, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyD6AqPbmW4UM1d1o8caBWSIi61yQsxxsGk",
            authDomain: "qr-absensi-unandnewgame.firebaseapp.com",
            projectId: "qr-absensi-unandnewgame",
            storageBucket: "qr-absensi-unandnewgame.firebasestorage.app",
            messagingSenderId: "377822320778",
            appId: "1:377822320778:web:f7305bb71019f670ccf573"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUid = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user || !user.emailVerified) { window.location.href = '/public/pages/login.html'; return; }
            currentUid = user.uid;

            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (!userDoc.exists()) { window.location.href = '/public/pages/login.html'; return; }

            const data = userDoc.data();
            const name = data.displayName || user.displayName || 'Player';
            document.getElementById('sidebarName').textContent = name;
            document.getElementById('sidebarRole').textContent = data.role || 'member';
            document.getElementById('avatarInitial').textContent = name.charAt(0).toUpperCase();

            if (['admin', 'superadmin'].includes(data.role)) {
                document.getElementById('adminLink').classList.remove('hidden');
                document.getElementById('logsLink').classList.remove('hidden');
            }
            if (data.role === 'pengurus') document.getElementById('adminLink').classList.remove('hidden');

            await loadLeaderboard();
        });

        async function loadLeaderboard() {
            try {
                const q = query(collection(db, 'users'), orderBy('xpCache', 'desc'));
                const snapshot = await getDocs(q);

                const users = snapshot.docs
                    .map((doc, index) => ({ rank: index + 1, uid: doc.id, ...doc.data() }))
                    .filter(u => u.status !== 'suspended');

                document.getElementById('totalMembers').textContent = `${users.length} anggota`;

                // Podium top 3
                const podiumEl = document.getElementById('podium');
                const podiumIcons = ['🥇', '🥈', '🥉'];
                const podiumOrder = [1, 0, 2]; // tampilkan: 2nd, 1st, 3rd

                podiumEl.innerHTML = podiumOrder.map(i => {
                    const u = users[i];
                    if (!u) return '<div></div>';
                    const isMe = u.uid === currentUid;
                    return `
                        <div class="glass border rounded-xl p-4 text-center ${i === 0 ? 'rank-1 md:scale-110' : i === 1 ? 'rank-2' : 'rank-3'} ${isMe ? 'ring-2 ring-ng-red' : ''}">
                            <div class="text-3xl mb-2">${podiumIcons[i]}</div>
                            <div class="w-12 h-12 rounded-full bg-gradient-to-br from-ng-red to-ng-blue flex items-center justify-center text-lg font-bold mx-auto mb-2">
                                ${(u.displayName || 'U').charAt(0).toUpperCase()}
                            </div>
                            <p class="font-bold text-sm truncate">${u.displayName || 'Unknown'}${isMe ? ' (Kamu)' : ''}</p>
                            <p class="text-ng-red font-bold text-lg">${u.xpCache || 0} XP</p>
                            <p class="text-gray-500 text-xs">${u.attendanceCount || 0}x hadir</p>
                        </div>
                    `;
                }).join('');

                // Full list
                const listEl = document.getElementById('leaderboardList');
                listEl.innerHTML = users.map(u => {
                    const isMe = u.uid === currentUid;
                    const rankIcon = u.rank === 1 ? '🥇' : u.rank === 2 ? '🥈' : u.rank === 3 ? '🥉' : `#${u.rank}`;
                    return `
                        <div class="leaderboard-item flex items-center gap-4 py-3 px-2 border-b border-white/5 last:border-0 rounded-lg ${isMe ? 'bg-ng-red/10' : ''}">
                            <span class="text-lg w-8 text-center">${rankIcon}</span>
                            <div class="w-9 h-9 rounded-full bg-gradient-to-br from-ng-red to-ng-blue flex items-center justify-center text-sm font-bold flex-shrink-0">
                                ${(u.displayName || 'U').charAt(0).toUpperCase()}
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-semibold truncate">${u.displayName || 'Unknown'}${isMe ? ' <span class="text-ng-red text-xs">(Kamu)</span>' : ''}</p>
                                <p class="text-xs text-gray-500">${u.attendanceCount || 0}x hadir</p>
                            </div>
                            <div class="text-right">
                                <p class="font-bold text-ng-red">${u.xpCache || 0}</p>
                                <p class="text-gray-500 text-xs">XP</p>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error('Leaderboard error:', error);
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = '/public/pages/login.html';
        });

        window.openSidebar = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.remove('hidden'); };
        window.closeSidebar = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.add('hidden'); };
    </script>
</body>
</html>
