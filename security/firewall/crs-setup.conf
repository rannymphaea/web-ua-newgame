# OWASP CRS v4 Setup — NEWGAME Hardened Profile
# Paranoia Level 2, Anomaly Scoring Mode
# =============================================================================

# ── Anomaly Scoring Thresholds ────────────────────────────────────────────────
# Inbound: block if total score >= 5
# Outbound: block if total score >= 4
SecAction \
    "id:900110,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.inbound_anomaly_score_threshold=5,\
    setvar:tx.outbound_anomaly_score_threshold=4"

# ── Paranoia Level 2 ──────────────────────────────────────────────────────────
# PL1: Basic attacks (SQLi, XSS, RCE, path traversal)
# PL2: Advanced evasion, protocol anomalies, unusual encodings
SecAction \
    "id:900000,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.paranoia_level=2"

# ── Sampling Mode (off for production — log everything) ────────────────────────
SecAction \
    "id:900400,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.sampling_percentage=100"

# ── Request Body Inspection ───────────────────────────────────────────────────
SecAction \
    "id:900001,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE"

SecAction \
    "id:900002,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.allowed_request_content_type=|application/json| |multipart/form-data| |application/x-www-form-urlencoded| |text/plain|"

SecAction \
    "id:900003,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.allowed_request_content_type_charset=utf-8|UTF-8|iso-8859-1"

# ── File Extensions Blacklist ─────────────────────────────────────────────────
SecAction \
    "id:900005,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:'tx.restricted_extensions=.asa/ .asax/ .ascx/ .axd/ .backup/ .bak/ .bat/ .cdx/ .cer/ .cfg/ .cmd/ .com/ .config/ .conf/ .cs/ .csproj/ .csr/ .dat/ .db/ .dbf/ .dll/ .dos/ .env/ .htr/ .htw/ .ida/ .idc/ .idq/ .inc/ .ini/ .key/ .licx/ .lnk/ .log/ .mdb/ .old/ .pass/ .pdb/ .pol/ .printer/ .pwd/ .rdb/ .resources/ .resx/ .sh/ .sql/ .swp/ .sys/ .vb/ .vbs/ .vbproj/ .vsdisco/ .webinfo/ .xsd/ .xsx/'"

# ── HTTP Protocol Compliance ──────────────────────────────────────────────────
SecAction \
    "id:900006,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.max_num_args=255,\
    setvar:tx.arg_name_length=100,\
    setvar:tx.arg_length=64000,\
    setvar:tx.total_arg_length=640000,\
    setvar:tx.max_file_size=1048576,\
    setvar:tx.combined_file_sizes=1048576"

# ── CRS Rule Exceptions for API endpoints ────────────────────────────────────
# Disable specific rules that cause false positives on JSON API
# Rule 920300: Missing Accept header (some API clients skip this)
SecRuleUpdateTargetById 920300 "!REQUEST_HEADERS:Accept"

# Rule 942100: SQL injection via libinjection — allow certain patterns in /api/news content field
SecRuleUpdateTargetById 942100 "!REQUEST_BODY"

# ── Scanner Detection ─────────────────────────────────────────────────────────
SecAction \
    "id:900007,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.block_search_ip=0"

# ── Enforce TLS Only (redirect handled at nginx level) ────────────────────────
SecAction \
    "id:900008,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.crs_setup_version=400"

# CRS rules are loaded AFTER this file via:
# Include /usr/share/modsecurity-crs/crs-setup.conf
# Include /usr/share/modsecurity-crs/rules/*.conf
