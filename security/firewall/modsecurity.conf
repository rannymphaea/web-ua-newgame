# ModSecurity v3 — NEWGAME Forensic Hardening Config
# Standard: OWASP ASVS L3 / NIST 800-53 / CIS Benchmark
# Mode: FULL AUDIT + FORENSIC LOGGING
# =============================================================================

SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html text/xml application/json

# ── Body limits ──────────────────────────────────────────────────────────────
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 131072
SecResponseBodyLimit 1048576
SecRequestBodyLimitAction Reject

# ── Audit log (FULL FORENSIC MODE) ───────────────────────────────────────────
SecAuditEngine On
SecAuditLog /var/log/modsecurity/audit.log
SecAuditLogFormat JSON
SecAuditLogParts ABCDEFHIJKZ
# A=Request line  B=Request headers  C=Request body  E=Intermediate response
# F=Response headers  H=Audit log trailer  I=Compact request body
# J=Multipart file upload info  K=Matched rules  Z=End boundary

SecAuditLogRelevantStatus "^(?:5|4(?!04))"

# ── Debug log ─────────────────────────────────────────────────────────────────
SecDebugLog /var/log/modsecurity/debug.log
SecDebugLogLevel 2

# ── Data directory ────────────────────────────────────────────────────────────
SecDataDir /tmp/modsecurity
SecTmpDir /tmp/modsecurity
SecUploadDir /tmp/modsecurity/uploads
SecUploadKeepFiles Off

# ── Geo-IP + ASN lookup ───────────────────────────────────────────────────────
# Requires libmaxminddb and GeoLite2-City.mmdb + GeoLite2-ASN.mmdb
SecGeoLookupDb /usr/share/GeoIP/GeoLite2-City.mmdb

# ── HTTP Fingerprinting ───────────────────────────────────────────────────────
# Capture full header fingerprint: method ordering, header ordering, TLS metadata
SecRule REQUEST_HEADERS:User-Agent "@rx ." \
    "id:9001,phase:1,pass,nolog,setvar:tx.user_agent=%{REQUEST_HEADERS.User-Agent}"

SecRule REQUEST_HEADERS:Accept "@rx ." \
    "id:9002,phase:1,pass,nolog,setvar:tx.accept_header=%{REQUEST_HEADERS.Accept}"

SecRule REQUEST_HEADERS:Accept-Encoding "@rx ." \
    "id:9003,phase:1,pass,nolog,setvar:tx.accept_encoding=%{REQUEST_HEADERS.Accept-Encoding}"

SecRule REQUEST_HEADERS:Accept-Language "@rx ." \
    "id:9004,phase:1,pass,nolog,setvar:tx.accept_language=%{REQUEST_HEADERS.Accept-Language}"

# ── JA3 SSL Fingerprint logging ───────────────────────────────────────────────
# Requires nginx module nginx-ssl-fingerprint or similar; passed via header
SecRule REQUEST_HEADERS:X-JA3-Fingerprint "@rx ." \
    "id:9005,phase:1,pass,nolog,setvar:tx.ja3_fingerprint=%{REQUEST_HEADERS.X-JA3-Fingerprint}"

# ── IP Reputation + Threat Score ─────────────────────────────────────────────
SecRule REMOTE_ADDR "@ipMatchFromFile /etc/modsecurity/bad-ips.txt" \
    "id:9010,phase:1,deny,status:403,log,auditlog,\
    logdata:'Blocked known bad IP: %{REMOTE_ADDR}',\
    tag:'REPUTATION',\
    msg:'IP found in blocklist'"

# Persistent IP threat scoring (in-memory counter)
SecAction "id:9020,phase:1,pass,nolog,initcol:ip=%{REMOTE_ADDR},setvar:ip.request_count=+1"
SecAction "id:9021,phase:1,pass,nolog,setvar:ip.first_request=%{TIME_EPOCH},expirevar:ip.first_request=3600"

# Rate-based threat escalation: > 200 req/min = suspicious
SecRule IP:REQUEST_COUNT "@gt 200" \
    "id:9022,phase:1,pass,nolog,setvar:tx.threat_score=+20,tag:'RATE_ANOMALY'"

# ── Auto-ban escalation ───────────────────────────────────────────────────────
SecAction "id:9030,phase:1,pass,nolog,initcol:global=GLOBAL"

# Increment ban counter on rule match
SecRule TX:ANOMALY_SCORE "@gt 20" \
    "id:9031,phase:5,pass,nolog,setvar:ip.ban_score=+1,expirevar:ip.ban_score=86400"

# Ban if ban_score > 10 (persistent across requests)
SecRule IP:BAN_SCORE "@gt 10" \
    "id:9032,phase:1,deny,status:403,log,auditlog,\
    msg:'IP auto-banned: repeated anomaly threshold exceeded',\
    tag:'AUTO_BAN'"

# ── Structured forensic log (JSON format per request) ────────────────────────
# Custom log format with RFC3339 timestamp, full request, geo-ip, threat score
SecAuditLogFormat JSON

# ── Request ID injection ──────────────────────────────────────────────────────
# UUIDv7-style request ID (requires Lua or pass from nginx)
SecRule REQUEST_HEADERS:X-Request-ID "@rx ^[0-9a-f-]{36}$" \
    "id:9040,phase:1,pass,nolog,setvar:tx.request_id=%{REQUEST_HEADERS.X-Request-ID}"

# ── Honeypot trap rules ───────────────────────────────────────────────────────
# Any access to these hidden endpoints = attacker signal
SecRule REQUEST_URI "@rx ^/(\.env|\.git|wp-admin|wp-login|phpmyadmin|admin\.php|xmlrpc\.php|shell\.php|c99\.php|config\.php|backup|\.htaccess|\.htpasswd)" \
    "id:9050,phase:1,deny,status:404,log,auditlog,\
    setvar:ip.ban_score=+5,\
    msg:'Honeypot trap triggered: %{REQUEST_URI}',\
    tag:'HONEYPOT'"

# Path traversal attempts
SecRule REQUEST_URI "@rx (\.\.\/|\.\.\\|%2e%2e%2f|%252e%252e%252f)" \
    "id:9051,phase:1,deny,status:400,log,auditlog,\
    setvar:ip.ban_score=+3,\
    msg:'Path traversal attempt detected',\
    tag:'TRAVERSAL'"

# SQL injection quick-detect
SecRule ARGS "@detectSQLi" \
    "id:9052,phase:2,deny,status:400,log,auditlog,\
    setvar:ip.ban_score=+5,\
    msg:'SQL injection detected in args',\
    tag:'SQLI'"

# XSS quick-detect
SecRule ARGS "@detectXSS" \
    "id:9053,phase:2,deny,status:400,log,auditlog,\
    setvar:ip.ban_score=+3,\
    msg:'XSS detected in args',\
    tag:'XSS'"

# ── Hacker de-anonymization (LEGAL) ──────────────────────────────────────────
# Metadata tagging: fingerprint all flagged requests for forensic export
# This ONLY logs/records — NO hack-back, NO active disruption
SecRule TX:THREAT_SCORE "@gt 15" \
    "id:9060,phase:5,pass,log,auditlog,\
    logdata:'FORENSIC_TAG|ip=%{REMOTE_ADDR}|ja3=%{tx.ja3_fingerprint}|ua=%{tx.user_agent}|score=%{tx.threat_score}|uri=%{REQUEST_URI}|method=%{REQUEST_METHOD}|timestamp=%{TIME}',\
    msg:'Forensic tag applied to high-threat request',\
    tag:'FORENSIC_METADATA'"

# Redirect sandbox for highest-threat IPs (score > 50)
# Sends attacker to a benign honeypot page instead of real 403
SecRule TX:THREAT_SCORE "@gt 50" \
    "id:9061,phase:1,pass,nolog,setvar:tx.sandbox_redirect=1"

# ── Content-Type enforcement ──────────────────────────────────────────────────
SecRule REQUEST_METHOD "^POST$" \
    "id:9070,phase:1,pass,chain"
SecRule REQUEST_HEADERS:Content-Type "!@rx (application/json|multipart/form-data|application/x-www-form-urlencoded)" \
    "deny,status:415,log,msg:'Invalid Content-Type for POST request',tag:'CONTENT_TYPE'"

# ── Block non-UTF8 traffic ────────────────────────────────────────────────────
SecRule REQUEST_HEADERS:Content-Type "@contains charset=" \
    "id:9080,phase:1,pass,chain,nolog"
SecRule REQUEST_HEADERS:Content-Type "!@rx charset=(utf-8|UTF-8)" \
    "deny,status:400,log,msg:'Non-UTF8 charset rejected',tag:'ENCODING'"
