# NGINX Hardened Configuration — NEWGAME
# TLS 1.3 only | JSON forensic logs | Adaptive rate limiting
# Standard: OWASP, CIS NGINX Benchmark, NIST 800-53
# =============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Basic ────────────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    server_tokens off;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;

    keepalive_timeout  65;
    keepalive_requests 100;
    client_max_body_size 10m;
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # ── UUIDv7-style Request ID (fallback: $request_id) ─────────────────────
    map $http_x_request_id $req_id {
        default $http_x_request_id;
        ""      $request_id;
    }

    # ── Geo-IP module (requires ngx_http_geoip2_module) ─────────────────────
    geoip2 /usr/share/GeoIP/GeoLite2-City.mmdb {
        $geoip2_data_country_code   country iso_code;
        $geoip2_data_country_name   country names en;
        $geoip2_data_city           city names en;
        $geoip2_data_latitude       location latitude;
        $geoip2_data_longitude      location longitude;
    }
    geoip2 /usr/share/GeoIP/GeoLite2-ASN.mmdb {
        $geoip2_data_asn            autonomous_system_number;
        $geoip2_data_asn_org        autonomous_system_organization;
    }

    # ── JA3 Fingerprint (requires nginx-ssl-fingerprint module) ─────────────
    # Passed downstream via header X-JA3-Fingerprint
    # ssl_ja3 on;  # Uncomment when module is installed

    # ── JSON Forensic Access Log ─────────────────────────────────────────────
    log_format forensic_json escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"request_id":"$req_id",'
            '"remote_addr":"$remote_addr",'
            '"remote_user":"$remote_user",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"args":"$args",'
            '"protocol":"$server_protocol",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_accept":"$http_accept",'
            '"http_accept_encoding":"$http_accept_encoding",'
            '"http_accept_language":"$http_accept_language",'
            '"ssl_protocol":"$ssl_protocol",'
            '"ssl_cipher":"$ssl_cipher",'
            '"geo_country":"$geoip2_data_country_code",'
            '"geo_country_name":"$geoip2_data_country_name",'
            '"geo_city":"$geoip2_data_city",'
            '"asn":"$geoip2_data_asn",'
            '"asn_org":"$geoip2_data_asn_org",'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_status":"$upstream_status",'
            '"upstream_response_time":"$upstream_response_time"'
        '}';

    access_log /var/log/nginx/access.json.log forensic_json;

    # ── Rate Limiting Zones ───────────────────────────────────────────────────
    # Global: 60 req/min per IP
    limit_req_zone $binary_remote_addr zone=global:20m   rate=60r/m;
    # API strict: 30 req/min per IP
    limit_req_zone $binary_remote_addr zone=api_strict:10m rate=30r/m;
    # Auth: 10 req/min per IP (brute force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m     rate=10r/m;
    # Burst zone for high-frequency endpoints
    limit_req_zone $binary_remote_addr zone=burst:10m    rate=120r/m;

    limit_req_status 429;
    limit_conn_status 429;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ── Upstream: NestJS API ──────────────────────────────────────────────────
    upstream nestjs_api {
        server 127.0.0.1:3001;
        keepalive 32;
    }

    # ── Upstream: Next.js Web ─────────────────────────────────────────────────
    upstream nextjs_web {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # ── Redirect HTTP → HTTPS ────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS Server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name newgame.example.com;

        # ── TLS 1.3 Only ─────────────────────────────────────────────────────
        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;

        ssl_certificate     /etc/ssl/certs/newgame.crt;
        ssl_certificate_key /etc/ssl/private/newgame.key;

        ssl_session_timeout 1d;
        ssl_session_cache   shared:SSL:50m;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling        on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/ssl/certs/ca-bundle.crt;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # ── Security Headers ──────────────────────────────────────────────────
        include /etc/nginx/conf.d/security-headers.conf;

        # ── Inject Request ID ─────────────────────────────────────────────────
        add_header X-Request-ID $req_id always;

        # ── Inject JA3 for ModSecurity pickup ────────────────────────────────
        # proxy_set_header X-JA3-Fingerprint $ssl_ja3;  # Uncomment when module ready

        # ── Block non-UTF8 Content-Type charset ──────────────────────────────
        if ($http_content_type ~* "charset=" ) {
            set $charset_check 1;
        }
        if ($http_content_type !~* "charset=(utf-8|UTF-8)") {
            set $charset_check "${charset_check}1";
        }
        if ($charset_check = "11") {
            return 400 "Non-UTF8 charset rejected";
        }

        # ── ModSecurity WAF ───────────────────────────────────────────────────
        modsecurity on;
        modsecurity_rules_file /etc/nginx/modsecurity/main.conf;

        # ── Rate limiting ─────────────────────────────────────────────────────
        limit_req zone=global burst=20 nodelay;

        # ── Next.js Frontend ──────────────────────────────────────────────────
        location / {
            proxy_pass         http://nextjs_web;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID $req_id;
            proxy_cache_bypass $http_upgrade;
        }

        # ── NestJS API ────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_strict burst=10 nodelay;

            proxy_pass         http://nestjs_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID $req_id;
            proxy_set_header   X-GeoIP-Country $geoip2_data_country_code;
            proxy_set_header   X-GeoIP-City $geoip2_data_city;
            proxy_set_header   X-ASN $geoip2_data_asn;
            proxy_set_header   X-ASN-Org $geoip2_data_asn_org;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ── Auth endpoints (strict rate limit) ───────────────────────────────
        location ~ ^/api/(auth|login|register) {
            limit_req zone=auth burst=3 nodelay;

            proxy_pass http://nestjs_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $req_id;
        }

        # ── Deny hidden files & sensitive paths ───────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        location ~* \.(env|git|gitignore|lock|log|bak|backup|sql|conf|key|pem)$ {
            deny all;
        }

        # ── Favicon / robots ─────────────────────────────────────────────────
        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }
    }
}
