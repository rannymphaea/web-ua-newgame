# NGINX Security Headers — NEWGAME
# Included by nginx.conf via: include /etc/nginx/conf.d/security-headers.conf
# Standard: OWASP ASVS L3, Mozilla Observatory A+
# =============================================================================

# ── HSTS (2 years, includeSubDomains, preload) ────────────────────────────────
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# ── Prevent Clickjacking ──────────────────────────────────────────────────────
add_header X-Frame-Options "DENY" always;

# ── Prevent MIME Sniffing ─────────────────────────────────────────────────────
add_header X-Content-Type-Options "nosniff" always;

# ── Referrer Policy ───────────────────────────────────────────────────────────
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ── XSS Protection (legacy browsers) ─────────────────────────────────────────
add_header X-XSS-Protection "1; mode=block" always;

# ── Permissions Policy ────────────────────────────────────────────────────────
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;

# ── Content Security Policy (strict) ─────────────────────────────────────────
# Nonce-based; nonce is generated per-request in Next.js middleware
add_header Content-Security-Policy "
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com;
    font-src 'self' https://fonts.gstatic.com data:;
    img-src 'self' data: https: blob:;
    connect-src 'self' https://firebaseapp.com https://*.googleapis.com wss:;
    media-src 'self' https://www.youtube.com;
    frame-src https://www.youtube.com https://www.youtube-nocookie.com;
    object-src 'none';
    base-uri 'self';
    form-action 'self';
    upgrade-insecure-requests;
    block-all-mixed-content;
" always;

# ── Cross-Origin Policies ─────────────────────────────────────────────────────
add_header Cross-Origin-Opener-Policy   "same-origin"           always;
add_header Cross-Origin-Embedder-Policy "require-corp"          always;
add_header Cross-Origin-Resource-Policy "same-site"             always;

# ── Cache Control for sensitive endpoints ────────────────────────────────────
add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
add_header Pragma "no-cache" always;
add_header Expires "0" always;

# ── Remove info-leaking headers ───────────────────────────────────────────────
# server_tokens off is set in nginx.conf
# These proxied headers should be hidden:
proxy_hide_header X-Powered-By;
proxy_hide_header Server;
proxy_hide_header X-AspNet-Version;
proxy_hide_header X-AspNetMvc-Version;
