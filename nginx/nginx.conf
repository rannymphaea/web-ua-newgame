# Nginx config — NEWGAME Security Hardened
# Satu-satunya entry point ke internet. Semua traffic masuk lewat sini.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Sembunyikan versi Nginx dari response header ──────────
    server_tokens off;

    # ── Log format dengan IP (untuk deteksi serangan) ─────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performa dasar ────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Rate limiting global (batas per IP) ───────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api:10m     rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ── Ukuran request maximum (cegah DoS via body besar) ─────
    client_max_body_size 10m;
    client_body_timeout  12s;
    client_header_timeout 12s;
    send_timeout 10s;

    # ── HTTP → HTTPS redirect ─────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Izinkan Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect semua ke HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Main Server ─────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name unandnewgame.com www.unandnewgame.com;  # sesuaikan domain

        # SSL
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # Rate limiting
        limit_req zone=general burst=50 nodelay;
        limit_conn conn 20;

        # ── Security headers (tambahan dari yang sudah di Next.js) ──
        add_header X-Frame-Options           "DENY"                           always;
        add_header X-Content-Type-Options    "nosniff"                        always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Permitted-Cross-Domain-Policies "none"                  always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # ── Blokir path berbahaya ─────────────────────────────
        # Cegah akses ke file sensitif
        location ~ /\. {
            deny all;
            return 404;
        }
        location ~ \.(env|sql|bak|log|sh|git)$ {
            deny all;
            return 404;
        }
        # Blokir path admin scanner umum
        location ~ ^/(wp-admin|phpmyadmin|admin\.php|xmlrpc\.php|\.git|\.svn) {
            deny all;
            return 404;
        }

        # ── Proxy ke Next.js web ──────────────────────────────
        location / {
            proxy_pass         http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection       'upgrade';
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;

            # Jangan forward header internal yang sensitif
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
        }

        # ── Proxy ke NestJS API (rate limit lebih ketat) ─────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://api:3001/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_hide_header  X-Powered-By;
            proxy_hide_header  Server;
            proxy_read_timeout 30s;
        }

        # ── Static assets dengan cache panjang ───────────────
        location ~* \.(png|jpg|jpeg|gif|webp|avif|svg|ico|woff|woff2|css|js)$ {
            proxy_pass http://web:3000;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
        }
    }
}
